<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Add multiple geometries from one GeoJSON source</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.9.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.9.1/mapbox-gl.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <script src="js/shp.js"></script>

    // Alternatively, you can include both files:
    <link href="js/nouislider.min.css" rel="stylesheet">
    <script src="js/nouislider.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        #filters {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background-color: white;
            padding: 20px;
        }

        .slider {
            padding: 10px 0px;
            display: flex;
            flex-direction: row;
            align-items: center;
        }


        .slider input {
            width: 50px;
        }

        .slider input {
            width: 50px;
        }
    </style>
</head>

<body>

    <div id="filters">

        <div class="slider">
            <div id="acresSlider" style="width:100%"></div>
        </div>

        <div class="slider">
            <div><input type="text" id="gbSlider-min"></div>
            <div>
                <div id="gbSlider" style="width:200px;margin:0px 20px;"></div>
            </div>
            <div><input type="text" id="gbSlider-max"></div>
        </div>
        <div>
            <label for="gbOnOff"><input type="checkbox" id="gbOnOff" checked>Population</label>
        </div>
        <div>
            <!-- <input type="text" id="shop" placeholder="shop name" /><button onclick="filterByShopName()">Filter</button> -->
            <div id="shop-list"></div>
        </div>
    </div>

    <div id="map"></div>



    <script>
        const gbSliderMin = document.getElementById('gbSlider-min');
        const gbSliderMax = document.getElementById('gbSlider-max');
        const gbOnOff = document.getElementById('gbOnOff');

        const acresSlider = document.getElementById('acresSlider');
        const selectedShops = ["Tesco", "Coop"];
        const shopName = document.getElementById("shop");
        const shopList = document.getElementById("shop-list");

        mapboxgl.accessToken = 'pk.eyJ1Ijoic3VqYW5jaGFrcmFib3J0eSIsImEiOiJja2Q5MzBuc3owenplMnBzY2I0eDYwdDhvIn0.imItePLDlYNF2BGVde_mkw';
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/light-v10',
            center: { lng: -5.38319371390287, lat: 54.328587368249714 },
            zoom: 5
        });

        noUiSlider.create(acresSlider, {
            start: [1, 8],
            connect: true,
            range: {
                'min': 0,
                'max': 10
            }, tooltips: {
                // tooltips are output only, so only a "to" is needed
                to: function (numericValue) {
                    return parseInt(numericValue)
                }
            },
            format: {
                from: function (value) {
                    return parseInt(value);
                },
                to: function (value) {
                    return parseInt(value);
                }
            }
        });

        noUiSlider.create(gbSlider, {
            start: [1000, 50000],
            connect: true,
            range: {
                'min': 0,
                'max': 200000
            },
        });
        gbSlider.noUiSlider.on('change', function (d) {
            console.log('change',);
            setGBFilter(d[0], d[1])
        });
        gbSlider.noUiSlider.on('update', function (d) {
            console.log('update',);
            gbSliderMin.value = parseInt(d[0])
            gbSliderMax.value = parseInt(d[1])
        });
        gbSliderMin.addEventListener('change', function () {
            gbSlider.noUiSlider.set([this.value, null]);
            updateGBFilters()
        });
        gbSliderMax.addEventListener('change', function () {
            gbSlider.noUiSlider.set([null, this.value]);
            updateGBFilters()
        });
        gbOnOff.addEventListener("change", () => {
            const visible = gbOnOff.checked ? 'visible' : 'none'
            map.setLayoutProperty('GBcircle', 'visibility', visible);
            map.setLayoutProperty('GBtext', 'visibility', visible);
        })
        function updateGBFilters() {
            console.log('update1111',);
            const min = gbSliderMin.value
            const max = gbSliderMax.value
            setGBFilter(min, max)
        }

        map.on('load', () => {

            /*
            fetch("data/bristol.zip")
                .then(text => text.arrayBuffer())
                .then((myshape) => shp(myshape))
                .then((data) => {
                    //geo.addData(data)
                    console.log('Bristol', data);
                    data.features.filter(i => i.geometry !== null).forEach(poly => {
                        poly.properties.area = turf.area(poly) / 4046;
                    })
                    map.getSource("polygons").setData(data)
                }).catch(e => console.log('error', e));


            fetch("data/Built-up_Areas_(December_2011)_Boundaries_V2.zip")
                .then(text => text.arrayBuffer())
                .then((myshape) => shp(myshape))
                .then((data) => {
                    //geo.addData(data)
                    console.log('data', data);
                    map.getSource("shapes").setData(data)
                }).catch(e => console.log('error', e));


            d3.csv("data/supermarket store location data - Sheet2.csv")
                .then(data => {
                    console.log('Store', data);
                    const pins = data.map(pin => {
                        const { property_latitude, property_longitude } = pin
                        return {
                            "type": "Feature", "properties": { ...pin, },
                            "geometry": {
                                "type": "Point", "coordinates": [+property_longitude, +property_latitude]
                            }
                        }
                    })
                    const featureCollection = turf.featureCollection(pins)
                    map.getSource("store").setData(featureCollection)

                    buildStoreFilters(data)
                    filterByShopNameS(selectedShops)
                })

                //*/

            d3.csv("data/gb.csv")
                .then(data => {
                    console.log('gb', data);
                    const pins = data.map(pin => {
                        const { lat, lng } = pin
                        return {
                            "type": "Feature", "properties": {
                                ...pin,
                                population: +pin.population,
                                cityandpop: pin.city + ' / ' + pin.population
                            },
                            "geometry": {
                                "type": "Point", "coordinates": [+lng, +lat]
                            }
                        }
                    })
                    const featureCollection = turf.featureCollection(pins)
                    map.getSource("gb").setData(featureCollection)
                })


            map.addSource('shapes', {
                'type': 'geojson',
                'data': {
                    'type': 'FeatureCollection',
                    'features': []
                }
            });

            map.addLayer({
                'id': 'shapes',
                'type': 'fill',
                'source': 'shapes',
                'paint': {
                    'fill-color': 'blue',
                    'fill-opacity': 0.8
                },
            });

            map.addSource('polygons', {
                'type': 'geojson',
                'data': {
                    'type': 'FeatureCollection',
                    'features': []
                }
            });

            map.addLayer({
                'id': 'polygons',
                'type': 'fill',
                'source': 'polygons',
                'paint': {
                    'fill-color': 'red',
                    'fill-opacity': 0.4
                },
            });

            map.addSource('gb', {
                'type': 'geojson',
                'data': {
                    'type': 'FeatureCollection',
                    'features': []
                }
            });
            map.addLayer({
                'id': 'GBcircle',
                'type': 'circle',
                'source': 'gb',
                'paint': {
                    'circle-radius': 6,
                    'circle-color': '#B42222'
                },
                'layout': {
                    'visibility': 'visible'
                },
            });
            map.addLayer({
                'id': 'GBtext',
                'type': 'symbol',
                'source': 'gb',
                'layout': {
                    'text-field': ['get', 'cityandpop'],
                    'text-size': 10,
                    'text-transform': 'uppercase',
                    'text-allow-overlap': true,
                    'icon-allow-overlap': true,
                    'text-offset': [0, 1],
                    'visibility': 'visible'
                },
                'paint': {
                    'text-color': '#202',
                    "text-halo-color": "#fff",
                    "text-halo-width": 2
                },
            });


            map.addSource('store', {
                'type': 'geojson',
                'data': {
                    'type': 'FeatureCollection',
                    'features': []
                }
            });
            map.addLayer({
                'id': 'store',
                'type': 'circle',
                'source': 'store',
                'paint': {
                    'circle-radius': 4,
                    // 'circle-color': [
                    //     'Aldi', 'Asda', 'Budgens', 'Farmfoods', 'Iceland', 'KILLARNEY', 'Lidl', 'Londis', 'Marks & Spencers', 'McColls', 'Morrisons', 'Nisa Local', 'SPAR', 'Sainsburys', 'Tesco'
                    // ],

                    'circle-color': [
                        'match',
                        ['get', 'company_name'],
                        'Aldi', '#fbb03b',
                        'Asda', '#223b53',
                        'Budgens', '#e55e5e',
                        'Farmfoods', '#3bb2d0',
                        'Iceland', 'red',
                        'KILLARNEY', 'green',
                        'Lidl', 'blue',
                        'Londis', 'orange',
                        'Marks & Spencers', 'yellow',
                        'McColls', 'pink',
                        'Morrisons', '#FF1493',
                        'Nisa Local', '#FF00FF',
                        'SPAR', '#1E90FF',
                        'Sainsburys', '#DAA520',
                        'Tesco', '#ADFF2F',
                        /* other */ '#ccc'
                    ]

                },
            });


            map.on('click', 'store', (e) => {
                console.log('e', e);
                // Copy coordinates array.
                const description = e.features[0].properties.company_name;
                new mapboxgl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(description)
                    .addTo(map);

                e.originalEvent.cancelBubble = true;
            });

            // Change the cursor to a pointer when the mouse is over the places layer.
            map.on('mouseenter', 'store', () => {
                map.getCanvas().style.cursor = 'pointer';
            });

            // Change it back to a pointer when it leaves.
            map.on('mouseleave', 'store', () => {
                map.getCanvas().style.cursor = '';
            });


            map.on('click', 'shapes', (e) => {

                if (e.originalEvent.cancelBubble) {
                    return;
                }
                console.log('e', e);
                // Copy coordinates array.
                const description = e.features[0].properties.bua11nm;
                new mapboxgl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(description)
                    .addTo(map);
            });
            // Change the cursor to a pointer when the mouse is over the places layer.
            map.on('mouseenter', 'shapes', () => {
                map.getCanvas().style.cursor = 'pointer';
            });

            // Change it back to a pointer when it leaves.
            map.on('mouseleave', 'shapes', () => {
                map.getCanvas().style.cursor = '';
            });



        });

        function buildStoreFilters(data) {

            const names = [...new Set(data.map(store => store.company_name).sort())]
            console.log('names', names);

            names.forEach(name => {

                const checkbox = buildCheckBox(name, selectedShops.includes(name), e => {
                    console.log('name', e);
                    const checked = e.target.checked
                    const value = e.target.id
                    if (checked) {
                        selectedShops.push(value)
                    } else {
                        var index = selectedShops.indexOf(value);
                        if (index !== -1) {
                            selectedShops.splice(index, 1);
                        }
                    }
                    filterByShopNameS(selectedShops)
                })
                shopList.appendChild(checkbox)
            })
        }

        function buildCheckBox(name, checked, eventFunction) {

            const div = document.createElement("div")
            const checkbox = document.createElement('input');
            checkbox.type = "checkbox";
            checkbox.name = "name";
            checkbox.value = name;
            checkbox.id = name;
            checkbox.addEventListener("input", eventFunction)
            checkbox.checked = checked
            var label = document.createElement('label')
            label.htmlFor = name;
            label.appendChild(document.createTextNode(name));

            div.appendChild(checkbox);
            div.appendChild(label);


            return div
        }


        function filterByShopName() {
            const name = shopName.value;
            map.setFilter('store', ['==', 'company_name', name]);
        }

        function filterByShopNameS(shopNameArray) {

            const filter = shopNameArray.map(name => {
                return ['==', 'company_name', name]
            })
            const filterArr = ['any', ...filter];
            console.log('filterArr', filterArr);
            map.setFilter('store', filterArr);
        }

        function setAreaFilter(min, max) {
            map.setFilter('polygons', ['all', ['>', 'area', min], ['<', 'area', max]]);
        }

        function setGBFilter(min, max) {
            console.log('min,max', min, max);
            map.setFilter('GBcircle', ['all', ['>', 'population', parseInt(min)], ['<', 'population', parseInt(max)]]);
            map.setFilter('GBtext', ['all', ['>', 'population', parseInt(min)], ['<', 'population', parseInt(max)]]);
        }
        //map.setFilter('gb',['none'])
    </script>

</body>

</html>
