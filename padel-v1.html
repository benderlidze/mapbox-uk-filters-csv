<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Add multiple geometries from one GeoJSON source</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <!-- ✅ FIXED: Downgraded from beta v3.17.0-beta.1 to stable v3.9.0 -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <script src="js/shp.js"></script>
    <link href="css/toggle.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
</head>

<body>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <p id="results"></p>
            <button type="button" class="buttons" id="copytoclipboard">Copy</button>
        </div>
    </div>

    <div id="filters" style="min-width: 250px;">
        <div id="search-div">
            <div class="autocomplete">
                <h1 id="propName"></h1>
                <div id="clear">
                    <div class="close-x"></div>
                </div>
                <input id="myInput" class="clearable" type="text" name="myCountry" placeholder="Search Town or City">
            </div>
            <div class="autocomplete" style="display: none;">
                <h1 id="propName"></h1>
                <div class="clear-input" id="clear-retailer">
                    <div class="close-x"></div>
                </div>
                <input id="inputRetailer" class="clearable" type="text" name="myCountry"
                    placeholder="Search by retailer name">
            </div>
        </div>
        <div class="item-header" style="display: none;">
            <span id="exportResults">Export results</span>
        </div>
        <div>
            <div id="prop-list"></div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        const filtersDiv = document.getElementById("filters");

        const urlParams = new URLSearchParams(window.location.search);
        const filterURL = urlParams.get('filter');
        if (filterURL && filterURL !== "") {
            filtersDiv.style.display = 'none';
        }

        let modalText;
        const input = document.getElementById("myInput");
        const inputRetailer = document.getElementById("inputRetailer");
        const clear = document.getElementById("clear");
        const clearRetailer = document.getElementById("clear-retailer");
        const shopList = document.getElementById("prop-list");
        const shopData = [];

        const copy = document.getElementById('copytoclipboard');
        const exportResults = document.getElementById('exportResults');
        exportResults.style.display = 'none';

        const modal = document.getElementById("myModal");
        const closeModal = document.getElementById("closeModal");
        const resultsDiv = document.getElementById("results");

        mapboxgl.accessToken = 'pk.eyJ1IjoicHJvcGVydHlhZGFtIiwiYSI6ImNsNHBuZXdpNDBieTUzanMyN2J3NW1sMHUifQ.m5BpgLHVufA0nzdFvCpTVg';

        const DEFAULT_VIEW = {
            lat: 54.12181638598531,
            lng: -2.774533172216252,
            zoom: 6
        };

        const parseQueryNumber = (value) => {
            if (value === null || value === undefined) return null;
            const normalized = String(value).trim().replace(',', '.');
            if (!normalized) return null;
            const parsed = Number(normalized);
            return Number.isFinite(parsed) ? parsed : null;
        };

        const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

        const queryLat = parseQueryNumber(urlParams.get('lat'));
        const queryLng = parseQueryNumber(urlParams.get('lng'));
        const queryZoom = parseQueryNumber(urlParams.get('zoom'));

        const hasValidCenter = queryLat !== null && queryLng !== null;
        const initialCenter = hasValidCenter
            ? {
                lat: clamp(queryLat, -90, 90),
                lng: clamp(queryLng, -180, 180)
            }
            : {
                lat: DEFAULT_VIEW.lat,
                lng: DEFAULT_VIEW.lng
            };

        const initialZoom = queryZoom !== null
            ? clamp(queryZoom, 0, 22)
            : DEFAULT_VIEW.zoom;

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/propertyadam/cmifz2fvw000a01r1hu4m6drw',
            center: { lng: initialCenter.lng, lat: initialCenter.lat },
            zoom: initialZoom
        });

        const getFirstValue = (obj, keys) => {
            for (const key of keys) {
                if (obj[key] !== undefined && obj[key] !== null && String(obj[key]).trim() !== '') {
                    return String(obj[key]).trim();
                }
            }
            return '';
        };

        const toNumber = (value) => {
            const parsed = Number(String(value ?? '').replace(',', '.'));
            return Number.isFinite(parsed) ? parsed : null;
        };

        const toSearchValue = (value) => String(value ?? '').trim().toLowerCase();

        const buildAddress = (row) => {
            const parts = [
                getFirstValue(row, ['address_street']),
                getFirstValue(row, ['address_city']),
                getFirstValue(row, ['address_postal_code']),
                getFirstValue(row, ['address_sub_administrative_area']),
                getFirstValue(row, ['address_administrative_area'])
            ].filter(Boolean);
            return parts.join(', ');
        };

        const buildDescription = (row) => {
            const items = [];
            const courts = getFirstValue(row, ['total_padel_courts', 'double_courts']);
            const weekdayPeak = getFirstValue(row, ['weekday_peak_price']);
            const weekdayOffpeak = getFirstValue(row, ['weekday_offpeak_price']);
            const weekend = getFirstValue(row, ['weekend_price']);
            const bookingType = getFirstValue(row, ['booking_type']);

            if (courts) items.push(`Courts: ${courts}`);
            if (weekdayOffpeak) items.push(`Weekday off-peak: ${weekdayOffpeak}`);
            if (weekdayPeak) items.push(`Weekday peak: ${weekdayPeak}`);
            if (weekend) items.push(`Weekend: ${weekend}`);
            if (bookingType) items.push(`Booking: ${bookingType}`);

            return items.join(' | ');
        };

        const normalizeRow = (row) => {
            const lat = toNumber(getFirstValue(row, ['address_lat', 'lat']));
            const lng = toNumber(getFirstValue(row, ['address_lon', 'address_lng', 'lng']));
            const city = getFirstValue(row, ['address_city', 'city', 'address']);
            const address = getFirstValue(row, ['address', 'Address']) || buildAddress(row) || city;
            const name = getFirstValue(row, ['tenant_name', 'name', 'tenant_uid', 'slug']);
            const slug = getFirstValue(row, ['slug']);
            const venueUrl = slug ? `https://padeldata.co.uk/venues/${slug}` : '';
            const website = getFirstValue(row, ['website_url', 'Website (fixed)', 'Planning permisson link', 'Flyer link new']);
            const description = getFirstValue(row, ['details_page_description', 'description', 'Notes on lease']) || buildDescription(row);

            return {
                ...row,
                name,
                slug,
                city,
                address,
                lat,
                lng,
                venueUrl,
                website,
                description,
                searchTown: city || address
            };
        };

        const toFeature = (pin) => {
            if (!Number.isFinite(pin.lng) || !Number.isFinite(pin.lat)) return null;
            return {
                "type": "Feature",
                "properties": { ...pin },
                "geometry": {
                    "type": "Point",
                    "coordinates": [pin.lng, pin.lat]
                }
            };
        };

        const buildFeatureCollection = (pins) => {
            const features = pins.map(toFeature).filter(Boolean);
            return turf.featureCollection(features);
        };

        const setMapData = (pins) => {
            const featureCollection = buildFeatureCollection(pins);
            map.getSource("traffic").setData(featureCollection);
            return featureCollection;
        };

        // --------------------- MODAL -----------------
        copy.addEventListener("click", () => {
            try {
                const htmlCode = document.querySelector("#results").innerHTML;
                const blobInput = new Blob([htmlCode], { type: 'text/html' });
                navigator.clipboard.write([new ClipboardItem({ 'text/html': blobInput })]);
            } catch (e) {
                alert(e);
            }
        });

        closeModal.addEventListener("click", () => {
            modal.style.display = "none";
        });

        exportResults.addEventListener("click", () => {
            modal.style.display = "block";
        });

        window.onclick = function (event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        };

        map.on('load', () => {

            // ✅ FIXED: Guard against duplicate source — only add if not already present
            if (!map.getSource('traffic')) {
                map.addSource('traffic', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features: []
                    },
                    cluster: true,
                    clusterMaxZoom: 20,
                    clusterRadius: 50
                });
            }

            map.addLayer({
                id: 'clusters',
                type: 'circle',
                source: 'traffic',
                filter: ['has', 'point_count'],
                paint: {
                    'circle-color': [
                        'step',
                        ['get', 'point_count'],
                        '#51bbd6',
                        100,
                        '#f1f075',
                        750,
                        '#f28cb1'
                    ],
                    'circle-radius': [
                        'step',
                        ['get', 'point_count'],
                        20,
                        100,
                        30,
                        750,
                        40
                    ]
                }
            });

            map.addLayer({
                id: 'cluster-count',
                type: 'symbol',
                source: 'traffic',
                filter: ['has', 'point_count'],
                layout: {
                    'text-field': '{point_count_abbreviated}',
                    'text-font': ['DIN Offc Pro Medium', 'Arial Unicode MS Bold'],
                    'text-size': 12
                }
            });

            map.addLayer({
                id: 'traffic',
                type: 'circle',
                source: 'traffic',
                filter: ['!', ['has', 'point_count']],
                paint: {
                    'circle-color': 'red',
                    'circle-radius': ['step', ['zoom'], 4, 15, 8],
                    'circle-stroke-width': 1,
                    'circle-stroke-color': '#fff'
                }
            });

            // ✅ Load CSV data AFTER source is added
            d3.csv("https://docs.google.com/spreadsheets/d/e/2PACX-1vT_akY4ZjU3mOq1mPhdVDh5d4dzXHmi5O8qgIf9BE8dwhP7O8Fn2D47zvkxhcNcFEnUoXTmQTybMXxS/pub?output=csv")
                .then(json => {
                    const data = json
                        .map(normalizeRow)
                        .filter(pin => Number.isFinite(pin.lat) && Number.isFinite(pin.lng));
                    console.log('Store', data);

                    shopData.push(...data);

                    autocomplete(input, [...new Set(data.map(i => toSearchValue(i.searchTown)).filter(Boolean))].map((i, key) => ({
                        index: key,
                        text: `${i}`
                    })), setShops);

                    autocomplete(inputRetailer, [...new Set(data.map(i => toSearchValue(i.name)).filter(Boolean))].map((i, key) => ({
                        index: key,
                        text: `${i}`
                    })), setByRetailerName);

                    const featureCollection = setMapData(data);
                    console.log('featureCollection', featureCollection);
                });

            // inspect a cluster on click
            map.on('click', 'clusters', (e) => {
                var features = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
                var clusterId = features[0].properties.cluster_id;
                var point_count = features[0].properties.point_count;
                var clusterSource = map.getSource('traffic');

                clusterSource.getClusterLeaves(clusterId, point_count, 0, function (err, features) {
                    printBrands(features);

                    const cities = [...new Set(features.map(i => i.properties.city || i.properties.address).filter(Boolean))].join("<br>");
                    new mapboxgl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(cities)
                        .addTo(map);
                });
            });

            map.on('mouseenter', 'clusters', () => {
                map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', 'clusters', () => {
                map.getCanvas().style.cursor = '';
            });

            map.on('click', 'traffic', (e) => {
                const properties = e.features[0].properties;
                const description = `
                    <strong>${properties.name || 'Location'}</strong><br>
                    ${properties.address || properties.city || ''}<br>
                    ${properties.venueUrl ? `<a href="${properties.venueUrl}" target="_blank" rel="noopener noreferrer">View Venue</a>` : ''}
                `;
                new mapboxgl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(description)
                    .addTo(map);
                e.originalEvent.cancelBubble = true;
            });

            map.on('mouseenter', 'traffic', () => {
                map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', 'traffic', () => {
                map.getCanvas().style.cursor = '';
            });
        });

        const clearInput = () => {
            input.value = '';
            inputRetailer.value = '';
            setMapData(shopData);
            shopList.innerHTML = '';
            exportResults.style.display = 'none';
        };

        clear.addEventListener("click", clearInput);
        clearRetailer.addEventListener("click", clearInput);

        const setShops = (name) => {
            const pins = shopData
                .filter(pin => toSearchValue(pin.searchTown) === toSearchValue(name));

            if (!pins.length) return;

            const featureCollection = setMapData(pins);
            printBrands(pins.map(toFeature).filter(Boolean));

            const center = turf.center(featureCollection);
            map.setCenter(center.geometry.coordinates);
        };

        const setByRetailerName = (name) => {
            const pins = shopData
                .filter(pin => toSearchValue(pin.name) === toSearchValue(name));

            if (!pins.length) return;

            const featureCollection = setMapData(pins);
            printBrands(pins.map(toFeature).filter(Boolean));

            const center = turf.center(featureCollection);
            map.setCenter(center.geometry.coordinates);
        };

        const printBrands = (list) => {
            const results = [];
            list.forEach(pin => {
                const { name, description, address, website, venueUrl } = pin.properties;
                results.push(`
                    <div class="list-item">
                        <div class="list-item-header">
                            <h3 class="list-item-name">${name}</h3>
                        </div>
                        ${address ? `<p class="list-item-description">${address}</p>` : ''}
                        ${description ? `<p class="list-item-description">${description}</p>` : ''}
                        ${venueUrl ? `<div class="list-item-footer"><a href="${venueUrl}" class="web-link" target="_blank" rel="noopener noreferrer">View Venue</a></div>` : ''}
                        ${website ? `<div class="list-item-footer"><a href="${website}" class="web-link" target="_blank">View Website</a></div>` : ''}
                    </div>
                `);
            });

            shopList.innerHTML = results.join("");

            const cities = [...new Set(list.map(i => i.properties.city || i.properties.address).filter(Boolean))].join(", ");
            let table = `<tr>
                <th style="border: 1px solid #dddddd;text-align: left;padding: 8px;">Name</th>
                <th style="border: 1px solid #dddddd;text-align: left;padding: 8px;">City</th>
                <th style="border: 1px solid #dddddd;text-align: left;padding: 8px;">Address</th>
            </tr>`;

            let index = 1;
            list.forEach(pin => {
                const { name, city, address } = pin.properties;
                index++;
                const style = (index % 2 === 0) ? 'style="background-color: #dddddd;"' : "";
                table += `<tr ${style}>
                    <td style="border: 1px solid #dddddd;text-align: left;padding: 8px;">${name}</td>
                    <td style="border: 1px solid #dddddd;text-align: left;padding: 8px;">${city || ''}</td>
                    <td style="border: 1px solid #dddddd;text-align: left;padding: 8px;">${address || ''}</td>
                </tr>`;
            });

            modalText = `
                <h3>Requirements for ${cities}</h3>
                <table style="border-collapse: collapse; width: 100%;">
                    ${table}
                </table>`;
            resultsDiv.innerHTML = modalText;
            exportResults.style.display = "block";
        };

        function autocomplete(inp, arr, callback) {
            var currentFocus;

            inp.addEventListener("input", function () {
                var a, b, i, val = this.value;
                closeAllLists();
                if (!val) return false;
                currentFocus = -1;

                a = document.createElement("DIV");
                a.setAttribute("id", this.id + "autocomplete-list");
                a.setAttribute("class", "autocomplete-items");
                this.parentNode.appendChild(a);

                let counter = 0;
                for (i = 0; i < arr.length; i++) {
                    const search = arr[i].text.toUpperCase().search(val.toUpperCase());
                    if (search > -1) {
                        b = document.createElement("DIV");
                        const text = arr[i].text.substr(0, search) +
                            '<b>' + arr[i].text.substr(search, val.length) + '</b>' +
                            arr[i].text.substr(search + val.length);
                        b.innerHTML = text;
                        b.innerHTML += "<input type='hidden' id=" + arr[i].index + " value='" + arr[i].text + "'>";
                        b.addEventListener("click", function () {
                            inp.value = this.getElementsByTagName("input")[0].value.replaceAll('<br>', ' ');
                            if (typeof callback === 'function') callback(inp.value);
                        });
                        if (counter > 20) return;
                        a.appendChild(b);
                        counter++;
                    }
                }
            });

            inp.addEventListener("keydown", function (e) {
                var x = document.getElementById(this.id + "autocomplete-list");
                if (x) x = x.getElementsByTagName("div");
                if (e.keyCode == 40) {
                    currentFocus++;
                    addActive(x);
                } else if (e.keyCode == 38) {
                    currentFocus--;
                    addActive(x);
                } else if (e.keyCode == 13) {
                    e.preventDefault();
                    if (currentFocus > -1 && x) x[currentFocus].click();
                }
            });

            function addActive(x) {
                if (!x) return false;
                removeActive(x);
                if (currentFocus >= x.length) currentFocus = 0;
                if (currentFocus < 0) currentFocus = x.length - 1;
                x[currentFocus].classList.add("autocomplete-active");
            }

            function removeActive(x) {
                for (var i = 0; i < x.length; i++) {
                    x[i].classList.remove("autocomplete-active");
                }
            }

            function closeAllLists(elmnt) {
                var x = document.getElementsByClassName("autocomplete-items");
                for (var i = 0; i < x.length; i++) {
                    if (elmnt != x[i] && elmnt != inp) {
                        x[i].parentNode.removeChild(x[i]);
                    }
                }
            }

            document.addEventListener("click", function (e) {
                closeAllLists(e.target);
            });
        }
    </script>

</body>

</html>
